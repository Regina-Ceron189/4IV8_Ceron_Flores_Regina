<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 1</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <script src="./JS/validarformulario.js"></script>
</head>
<body>

<form onsubmit="return calcular()">

<label>Capital:</label>
<input type="number" id="capital" required>

<input type="submit" value="Calcular">

</form>

<p id="resultado"></p>

<script>
function calcular(){
    let capital = parseFloat(document.getElementById("capital").value);

    let interes = capital * 0.02;
    let total = capital + interes;

    document.getElementById("resultado").innerHTML =
        "Ganancia: $" + interes.toFixed(2) + 
        " | Total: $" + total.toFixed(2);

    return false; // evita recargar la página
}
</script>
<div class="container-footer">
            <footer>
                <h2>Esta etiqueta sirve principalmente como pie de pagina, y lo mas comun es colocar redes sociales, contacto, terminos legales, etc.</h2>
                <a href="../index.html">Regresar a pagina principal</a>
            </footer>
        </div>

</body>
</html>
