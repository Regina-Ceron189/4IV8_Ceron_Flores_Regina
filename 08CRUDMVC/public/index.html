<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUDMVC</title>
</head>
<body>

    <header>
        <h1>Sistema de Compras </h1>
        <p>Ejemplo de Gestión de Compras</p>
        <nav class="tabs">
            <button class="tabs active" onclick="cambiarSeccion('Usuario')"> Usuarios </button>
            <button class="tabs" onclick="cambiarSeccion('Producto')"> Productos </button>
            <button class="tabs" onclick="cambiarSeccion('Compras')"> Compras </button>

        </nav>

    </header>

    <section class="info-apí" > 
        <h3>Estado de la api</h3>
        <div class="api-status" >
            <span id="api-metodo" class="badge">-</span>
            <span id="api-url" class="api-url">-</span>
            <span id="api-codigo" class="badge badge-natural">-</span>
        </div>
        
    </section>

    <div id="seccion-usuarios" class="seccion" >
        <section class="formulario-usuario">
            <h2 id="form-titulo-usuario" >Agregar Usuario</h2>
            <form id="form-usuario" novalidate></form>
            <input type="hidden" id="usuario-id">
            <div class="campos-grid" >
                <div class="campo">
                    <label for="usuario-nombre">Nombre:</label>
                    <input type="text" id="usuario-nombre" placeholder="Aqui va tu nombre" maxlength="100" required>
                    <span class="error" id="error-usuario-nombre" ></span>
                </div>
                <div class="campo">
                    <label for="usuario-email">Email:</label>
                    <input type="email" id="usuario-email" placeholder="Aqui va tu email" maxlength="100" required>
                    <span class="error" id="error-usuario-email" ></span>
                </div>
            </div>
            <div class="botones" >
                <button type="submit" id="btn-guardar-usuario" >Guardar</button>
                <button type="button" id="btn-cancelar-usuario" class="btn-secundario" style="display:none;" >Cancelar</button>
            </div>
        </section>
    </div>
    
</body>
</html>
