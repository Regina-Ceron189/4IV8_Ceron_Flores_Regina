                    </td>

                        <input type="text" name="sueldo1" id="sueldo1" readonly="readonly">

                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="button" value="borrar Datos" name="delete" onclick="borrar()">
                    </td>
                </tr>
            </table>

    </form> 
   </div>
